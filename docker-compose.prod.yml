services:
  rnp-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rnp-assistant
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      APP_DATA_DIR: /app/storage
    ports:
      - "${APP_PORT:-3030}:3000"
    volumes:
      - rnp-assistant-storage:/app/storage

volumes:
  rnp-assistant-storage:
